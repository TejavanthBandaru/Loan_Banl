{% extends "base.html" %}
{% block title %}Page Not Found – LoanLink Hyderabad{% endblock %}
{% block content %}
<section class="section-pad text-center" style="min-height: 70vh; display:flex; align-items:center;">
  <div class="container">
    <div class="error-icon mb-4" data-aos="zoom-in">
      <i class="fa-solid fa-circle-exclamation text-red" style="font-size: 5rem;"></i>
    </div>
    <h1 class="display-1 fw-bold" style="color: var(--navy);" data-aos="fade-up">404</h1>
    <h3 class="mb-3" data-aos="fade-up" data-aos-delay="100">Oops! Page Not Found</h3>
    <p class="text-muted mb-4" data-aos="fade-up" data-aos-delay="200">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <div data-aos="fade-up" data-aos-delay="300">
      <a href="{{ url_for('home') }}" class="btn btn-primary-custom me-3">
        <i class="fa-solid fa-house me-2"></i> Go Home
      </a>
      <a href="{{ url_for('contact') }}" class="btn btn-outline-apply">
        Contact Us
      </a>
    </div>
  </div>
</section>
{% endblock %}
